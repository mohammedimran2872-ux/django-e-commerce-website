{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>You Win!</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #ffcc00, #ff6699, #66ccff);
      color: white;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    h1 {
      font-size: 4rem;
      font-weight: bold;
      text-shadow: 2px 2px 5px #000;
    }
    .btn-custom {
      margin-top: 20px;
      background-color: #fff;
      color: #333;
      font-weight: bold;
      border-radius: 25px;
      padding: 10px 20px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background-color: #333;
      color: #fff;
    }
  </style>
</head>
<body>

  <div>
    <h1>🎉 Congratulations! You Win! 🎉</h1>
    <p class="lead">You've completed the challenge successfully.</p>
    <a href="{% url 'tournament' %}" class="btn btn-custom">Play Again</a>
    <a href="{% url 'main' %}" class="btn btn-custom">Go Home</a>
  </div>

  <audio id="winSound" src="{% static 'audio/victory sound.mp3' %}"></audio>
  <h1 id="user" style="display: none;">{{request.user}}</h1>

  <script>
    const winAudio = document.getElementById("winSound");
    console.log(winAudio)

    window.onload = function demo () {
      // Only play if not already played in this session
      if (user){
         winAudio.play();
        console.log("audio play successfully")

        winAudio.volume = 0.9;
      }
     
        
     // mark as played
      
    };
   
  </script>

</body>
</html>
