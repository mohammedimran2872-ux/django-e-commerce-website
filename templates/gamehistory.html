

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>Document</title>
</head>
    <style>
        body{
       background-color:white;
        }

        table th, td{
            padding: 10px;
        }
        th{
            color: rgb(22, 6, 6);
            font-size: 35px;
            font-weight: bold;
        }
        td{
            font-size: 25px;
            font-style: italic;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            /* background: linear-gradient(to right, #31f04e, #3f8feb); */
            color: rgb(1, 0, 0);
           
        }
        h2{
            font-style: oblique;
            font-size: 35px;
            color: rgb(19, 23, 27);
            /* background: linear-gradient(to left, orange, blue); */
            /* background-clip: text; 
             -webkit-text-fill-color: transparent; */
        }
        a{
            text-decoration: none;
            color: rgb(33, 0, 100);
            font-size: 25px;
            font-family:cursive;
            position:sticky;
            border: 1px solid black;
            padding: 5px;

        }
        div{
            width: 100%;
            height: 10%;
           
            display:flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            
        }
        table {
           height: 150px;
           overflow-y: scroll;
            border-collapse: collapse;
            width:80%;
            border-bottom: 1px solid rgb(5, 2, 2);
        }
        table tr{
 width: 90%;
 border-top:1px solid rgb(11, 3, 3) ;
 border-left:1px solid rgb(11, 3, 3) ;
 border-right:1px solid rgb(11, 3, 3) ;
        }
         table tr th{
            padding: 10px;
            /* font-size: px; */
         }
        /* style =" margin-left: 200px ;margin-top: 20px;height :200px;" */
    </style>
<body>
      <!-- <a href="{% url 'main' %}">Home</a> -->
        <a class="btn btn-outline-dark" href="{% url 'main' %}">&#x2190;Back</a>
    <!-- <h1>View</h1> -->
     <div>
         
    {% if username %}
<h2 > {{username}} Game History Records <br></h2>  
    {% endif %}
       
<table  >
        
        <tr>
            
            <th><center>Your Guess</center></th>
            <th><center>Attempt</center> </th>
           
            <th><center>Hint</center>  </th>
        </tr>
    
   
        {% for item in gamehistory %}
          <tr>
           
            <td> <center>{{ item.input }}</center></td>
            
            <td><center>{{item.status}} </center></td>
            <td><center>{{item.key}} </center></td>
                
           
            
          </tr>

          
          {% endfor %}

            </table>
             {% if messages %}
              <h1>{{messages}}</h1>
                {% endif %}
        </div>
       
    
</body>
{% endblock content %}
</html>
