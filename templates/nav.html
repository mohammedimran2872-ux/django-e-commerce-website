 .navbar {
     display: flex;
     justify-content: space-between;
     align-items: center;
     padding: 10px 20px;
     height: 10%;
     background: rgb(241, 224, 33);
     color: black;
 }

.container{
    overflow: hidden;
}
 .logo a  {
     font-size: 20px;
     border-radius: 50%;
 }

 /* Hide checkbox */
 #menu-toggle {
     display: none;
 }

 /* Hamburger icon */
 .hamburger {
     display: none;
     font-size: 26px;
     cursor: pointer;
     color: #0d0c0c;
 }

 /* Menu items */
 .nav-links {
     list-style: none;
     display: flex;
     gap: 90px;
     color: black;
     margin-top: 10px;
 }
 .nav-links li{
    font-size: 20px;
 }

 .nav-links a {
     color: rgb(7, 7, 7);
     text-decoration: none;
     transition: 0.3s;
     font-size: 20px;
 }

 .nav-links a:hover {
     color: #00d0ff;
     border-bottom: 1px dashed #00d0ff;
     ;
 }

 .contact {
     color: white;
     border: 1px solid blue;
     background-color: #0077ff;
     padding: 8px 15px;
     font-weight: lighter;

     border-radius: 20px;
     font-size: 19px;
 }

 .contact:hover {
     box-shadow: -5px -2px 10px 3px gray;
 }

 /* -------------------------
   Responsive Styles
----------------------------*/
 @media (max-width: 768px) {
     .hamburger {
         display: block;
     }

     .nav-links {
        align-items: baseline;
        justify-content:space-around;
        height: 343px;
         position: absolute;
         top: 78px;
         left: -100%;
         width: 100%;
         background: #ebe5e5;
         flex-direction: column;
         gap: 61px;
         padding: 20px;
         transition: 0.4s;
         margin-top: 0px;
         z-index: 9999999999999999999999999;
     }

     /* Show menu when checkbox checked */
     #menu-toggle:checked~.nav-links {
         left: 0;
     }
 }
    </style>
<body>
   
         <nav class="navbar">
                <div class="logo"> <a class="navbar-brand text-primary" href="#">
                    <i style="font-size: 30px;" class="fa-brands fa-twitch"></i><strong style="font-size: 25px;"> random  game</strong></a>
                </div>
                
                <!-- <h1 class="logo">logo</h1> -->

                <!-- Menu Toggle Checkbox -->
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="hamburger">&#9776;</label>

                <ul class="nav-links">
                    
                    <li> <i class="fa-solid fa-sack-dollar"></i> {{coins}}</li>
                    <li><i class="fa-solid fa-user"></i> {{customer}}</li>
                    <li><a href="{% url 'login' %}" class=""><i class="fa-solid fa-door-open"></i>  Logout</a>
</li>
                    
                </ul>
            </nav>
                <br>

    {% block content %}

  {% endblock content %}
</body>
